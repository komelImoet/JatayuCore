site_name: JatayuCore
site_description: Multi-Agent AI Trading Framework — Filosofi Elang, Presisi Mesin
site_url: https://komelimoet.github.io/JatayuCore
repo_url: https://github.com/komelImoet/JatayuCore
repo_name: komelImoet/JatayuCore

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - content.code.copy

nav:
  - Home: index.md
  - Filosofi: philosophy.md
  - For Non-Technical Users: for-non-technical.md
  - Architecture: architecture.md
  - Getting Started:
    - Installation: setup.md
    - Configuration: configuration.md
  - Features:
    - Telegram Notifications: telegram.md
    - Broker (Alpaca): broker.md
    - Scheduler: scheduler.md
    - MT5 Execution Engine: mt5-engine.md
  - Deployment:
    - Docker: docker.md
  - Future Improvements: future-improvements.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/komelImoet/JatayuCore
