<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="wingGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3F51B5"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6F00"/>
      <stop offset="100%" stop-color="#E65100"/>
    </linearGradient>
  </defs>

  <!-- Geometric eagle/J letterform -->
  <g transform="translate(15, 20)">
    <!-- Main J-curve / wing sweep -->
    <path d="M 5 40
             Q 5 10 30 8
             Q 55 6 70 15
             Q 85 24 85 40
             Q 85 60 75 68
             Q 65 76 50 76
             Q 35 76 30 65"
          fill="none" stroke="url(#wingGrad)" stroke-width="9" stroke-linecap="round"/>

    <!-- Feather accent lines on the J curve -->
    <path d="M 30 8 Q 45 4 60 8" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <path d="M 50 12 Q 65 8 78 16" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 65 20 Q 75 16 82 24" fill="none" stroke="url(#accent)" stroke-width="2" stroke-linecap="round"/>

    <!-- Eagle head dot on top of J -->
    <circle cx="28" cy="8" r="5" fill="url(#accent)"/>
    <circle cx="28" cy="8" r="2" fill="#fff" opacity="0.6"/>

    <!-- Sharp beak line -->
    <path d="M 85 40 L 95 38 L 85 44 Z" fill="url(#accent)"/>

    <!-- Small decorative diamond -->
    <rect x="58" y="72" width="6" height="6" rx="1" fill="url(#accent)" transform="rotate(45 61 75)"/>
  </g>

  <!-- Text -->
  <g transform="translate(120, 38)">
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="42" font-weight="800" fill="#1A237E" letter-spacing="-0.5">
      Jatayu<tspan fill="#FF6F00">Core</tspan>
    </text>
    <text x="2" y="22" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="12" fill="#888" letter-spacing="4" font-weight="600">
      MULTI-AGENT AI TRADING
    </text>
  </g>
</svg>
